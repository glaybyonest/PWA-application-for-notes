<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PWA-application for notes</title>
    <meta name="theme-color" content="#1f6b5b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/icons/favicon-152x152.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="shell-header">
        <div>
          <h1>Заметки</h1>
        </div>
        <span
          id="connection-status"
          class="status-pill status-pill--neutral"
          aria-live="polite"
          title="Состояние WebSocket"
        >
          Проверяем WebSocket...
        </span>
      </header>

      <main id="page-container" class="page-container" aria-live="polite">
        <section class="card loading-card">
          <p>...</p>
        </section>
      </main>
    </div>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
